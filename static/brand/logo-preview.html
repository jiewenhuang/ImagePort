<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ImagePort Logo Preview</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #f7f8f8;
        color: #102033;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 48px 24px;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 28px;
        letter-spacing: 0;
      }
      p {
        margin: 0 0 28px;
        color: #667085;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 18px;
      }
      .card {
        border: 1px solid #dde3ea;
        border-radius: 8px;
        background: white;
        padding: 20px;
      }
      img {
        display: block;
        width: 128px;
        height: 128px;
        margin: 0 auto 14px;
      }
      strong {
        display: block;
        text-align: center;
      }
      .concept {
        margin-top: 28px;
      }
      .concept img {
        width: 100%;
        height: auto;
        border-radius: 8px;
        border: 1px solid #dde3ea;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ImagePort Logo</h1>
      <p>当前正式图标使用 App Icon PNG；其余 SVG 保留为草案。</p>
      <div class="grid">
        <div class="card"><img src="./imageport-app-icon.png" alt="App Icon" /><strong>App Icon</strong></div>
        <div class="card"><img src="./imageport-mark-minimal-focus.svg" alt="Minimal Focus" /><strong>Minimal Focus</strong></div>
        <div class="card"><img src="./imageport-mark-minimal-frame.svg" alt="Minimal Frame" /><strong>Minimal Frame</strong></div>
        <div class="card"><img src="./imageport-mark-portal.svg" alt="Portal" /><strong>Portal</strong></div>
        <div class="card"><img src="./imageport-mark-porthole.svg" alt="Porthole" /><strong>Porthole</strong></div>
        <div class="card"><img src="./imageport-mark-stack.svg" alt="Stack" /><strong>Stack</strong></div>
        <div class="card"><img src="./imageport-mark-beam.svg" alt="Beam" /><strong>Beam</strong></div>
      </div>
      <div class="concept">
        <p>AI 概念草图</p>
        <img src="./imageport-logo-concepts-minimal.png" alt="AI minimal logo concepts" />
        <img src="./imageport-logo-concepts.png" alt="AI logo concepts" />
      </div>
    </main>
  </body>
</html>
